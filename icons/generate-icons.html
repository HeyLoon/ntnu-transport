<!DOCTYPE html>
<html>
<head>
    <title>PWA Icon Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
        .icons { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .icon-item { text-align: center; }
        canvas { border: 1px solid #333; background: #fff; }
        a { color: #e94560; display: block; margin-top: 5px; }
        button { background: #e94560; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>NTNU Transport PWA Icons</h1>
    <p>Click each "Download" link to save the icon, then place them in the /icons folder.</p>
    <button onclick="downloadAll()">Download All Icons</button>
    <div class="icons" id="iconsContainer"></div>

    <script>
        const sizes = [16, 32, 72, 96, 128, 144, 152, 180, 192, 384, 512];
        
        function drawIcon(ctx, size) {
            const scale = size / 512;
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            
            // Rounded rectangle background
            const radius = 80 * scale;
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, radius);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Bus body
            const busX = size / 2;
            const busY = size * 0.39;
            const busW = 160 * scale;
            const busH = 100 * scale;
            const busR = 15 * scale;
            
            ctx.beginPath();
            ctx.roundRect(busX - busW/2, busY - busH/2, busW, busH, busR);
            ctx.fillStyle = '#e94560';
            ctx.fill();
            
            // Windows
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            const winW = 50 * scale;
            const winH = 35 * scale;
            const winR = 5 * scale;
            ctx.beginPath();
            ctx.roundRect(busX - 70*scale, busY - 45*scale, winW, winH, winR);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(busX + 20*scale, busY - 45*scale, winW, winH, winR);
            ctx.fill();
            
            // Wheels
            const wheelY = busY + 55*scale;
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(busX - 45*scale, wheelY, 18*scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(busX + 45*scale, wheelY, 18*scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(busX - 45*scale, wheelY, 8*scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(busX + 45*scale, wheelY, 8*scale, 0, Math.PI * 2);
            ctx.fill();
            
            // Text (only for larger icons)
            if (size >= 96) {
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${72*scale}px Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('NTNU', size/2, size * 0.74);
                
                ctx.fillStyle = '#e94560';
                ctx.font = `${36*scale}px Arial, sans-serif`;
                ctx.fillText('交通助手', size/2, size * 0.86);
            } else if (size >= 32) {
                // Simplified text for small icons
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${size * 0.25}px Arial, sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText('NT', size/2, size * 0.85);
            }
        }
        
        function generateIcons() {
            const container = document.getElementById('iconsContainer');
            
            sizes.forEach(size => {
                const div = document.createElement('div');
                div.className = 'icon-item';
                
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                canvas.id = `icon-${size}`;
                
                const ctx = canvas.getContext('2d');
                drawIcon(ctx, size);
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = `icon-${size}.png`;
                link.textContent = `Download ${size}x${size}`;
                
                div.appendChild(canvas);
                div.appendChild(document.createElement('br'));
                div.appendChild(document.createTextNode(`${size}x${size}`));
                div.appendChild(link);
                
                container.appendChild(div);
            });
        }
        
        function downloadAll() {
            sizes.forEach((size, index) => {
                setTimeout(() => {
                    const canvas = document.getElementById(`icon-${size}`);
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `icon-${size}.png`;
                    link.click();
                }, index * 200);
            });
        }
        
        generateIcons();
    </script>
</body>
</html>
